#Test
name: CI — Docker Build Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Maven build
        run: mvn clean package -B -DskipTests=true

      - name: Docker build
        run: docker build -t test-maven-app:${{ github.sha }} .
